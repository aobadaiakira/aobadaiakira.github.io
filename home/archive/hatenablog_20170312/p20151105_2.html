</div>

<!-- 記事本文 -->
<div class="main_text">
<p>中流家庭の主人公が住んでる郊外の家が、日本の基準だと豪邸にしか見えない。<br />芝生が敷き詰められた広い庭に木製のブランコ。洒落たリビング。ガレージにはデカい車。それぞれの子供部屋にトイレと風呂。<br />主人公が人生に悩んでいたりするとイラッとする。何が不満なんだ、と。</p>
