<h2>あらすじ</h2>
<p class="introduction">　乾燥した砂漠を走る砂上船、タルナーダ号。<br>
　乗組員は、<br>
　機械に組込まれた人工頭脳に知能をコピーした、船長。<br>
　クリーガーと呼ばれる巨人型兵器を操る男、浩一郎。<br>
　ナノ・マシーンを体内に仕込まれた女、亜矢子。<br>
　八歳の少女、那柚。<br>
　安住の地を求め放浪するタルナーダ号が出会う人々と事件の数々。</p>
