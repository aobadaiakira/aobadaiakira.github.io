<h2>あらすじ</h2>
<p class="introduction">十一月の終わり夜八時過ぎ。<br>
土砂降りの冷たい雨の中、塾帰りの女子高校生サトミを乗せたバスは広大な廃工場の前で停車した。<br>
そして惨劇は始まった。<br>
<br>
超常心霊ホラーとスラッシャーの中間のような小説です。<br>
登場人物がたくさん死にます。<br>
ちょっと悪趣味で、グロ描写があります。ご注意ください。<br>
<br>
この物語は、法律・法令に反する行為を容認・推奨するものではありません。</p>
