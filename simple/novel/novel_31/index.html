<h2>あらすじ</h2>
<p class="introduction">昔むかし、ある村に一人の百姓が住んでいました。<br>
百姓には三人の息子がいました。<br>
名前を一郎、二郎、三郎と言いました。<br>
百姓は死ぬ直前、三人の息子に自分の土地を分け与えました。</p>
