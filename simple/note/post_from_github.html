githubの管理ページから投稿してみる。
<p>
githubは、webから新しいファイルを生成してウェブ上のテキストエリアで編集することが出来る。<br>
つまり、静的サイトでありながら、ウェブ上で編集が出来る訳だ。<br>
いちいちインデックスページにリストを追加しなければいけないとか、いろいろ面倒な事はあるが、それでも無いよりはマシだろう。<br>
これで、静的サイトでありながら、ツイッター的短文程度ならウェブから投稿して公開する仕組みが出来たわけだ。<br>
しかも、ウェブ上で行った変更は、ローカルにpullすれば同期できる。<br>
