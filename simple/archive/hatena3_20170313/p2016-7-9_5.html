<h2 class="entry_title">フロー型の記事と、ストック型の記事を同じインターフェースで使えれば最高だ。</h2>
<p>Tag <span class="tag">[ 未整理思考, ウェブ ]</span></p>
<p>人間には、日々思ったことをつらつらと<a class="keyword" href="http://d.hatena.ne.jp/keyword/%A5%C4%A5%A4%A5%C3%A5%BF%A1%BC">ツイッター</a>に書くような「フロー型記事」も必要だし、じっくりと構成を練って数年後に読んでもちゃんと意味が通る「ストック型記事」も必要だ。</p>

<p>その両方を同じインターフェースで使えれば最高だ。</p>
