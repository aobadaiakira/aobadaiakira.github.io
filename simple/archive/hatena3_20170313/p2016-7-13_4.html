<h2 class="entry_title">ＳＦが行きわたった結果、ＳＦであることに意味は無くなった。</h2>
<p>Tag <span class="tag">[ 未整理思考, 小説, 映画 ]</span></p>
<p>映画や小説にＳＦ的要素が多少含まれていても今は誰も驚きもしないし、拒否反応も示さなくなった。</p>

<p>そして、良い意味で特別視される事もなくなった。</p>

<p>つまりＳＦであるというだけで事で差別される事も無くなり、そのかわりに、ＳＦだから特別、という感覚も無くなった。</p>
