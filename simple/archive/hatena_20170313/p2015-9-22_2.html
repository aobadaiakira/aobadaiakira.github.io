<p>メール投稿を試してみる。</p>
<p>メールのタイトルが記事のタイトルに、メールの本文が記事の本文になるようだ。</p>
<p>いきなり投稿するアドレスと、下書き用のアドレスがある。この文章は、いきな</p>
<p>り投稿用アドレスへ送信したものだ。</p>
<p>画像を添付すると、自動的に記事の冒頭に挿入されるようだ。</p>
